name: HEMS
description: Home Energy Management add-on using Range-Based battery scheduling with adaptive control and optional solar
version: "0.1.0"
slug: hems
init: false
homeassistant_api: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

auth_api: true

# Options schema for UI-managed settings
options:
  # Core sensors (from battery-api add-on)
  price_sensor_entity_id: "sensor.energy_prices_electricity_import_price"
  average_power_sensor_entity_id: "sensor.battery_api_load_power"      # +import / -export, used for adaptive power
  battery_power_sensor_entity_id: "sensor.battery_api_battery_power"   # +charge / -discharge
  battery_grid_power_sensor_entity_id: "sensor.battery_api_grid_power" # +import / -export
  battery_soc_sensor_entity_id: "sensor.battery_api_battery_soc"
  battery_api_status_sensor_entity_id: "sensor.battery_api_api_status"

  # Strategy power & SOC
  max_inverter_power_w: 8000
  default_charge_power_w: 8000
  default_discharge_power_w: 8000
  min_discharge_power_w: 0
  min_scaled_power_w: 2500
  conservative_soc_threshold_percent: 30.0
  minimum_discharge_soc_percent: 5.0

  # Price window selection
  topx_charge_count: 30
  topx_discharge_count: 10

  # Timing
  adaptive_monitor_interval_minutes: 1
  adaptive_power_grace_period_seconds: 60
  schedule_regeneration_cooldown_seconds: 60
  status_refresh_minutes: 15
  daily_reload_time: "01:00"
  hourly_regeneration: true

  # Adaptive behavior
  adaptive_disable_threshold_w: 1500
  adaptive_power_increment_w: 100

  # Temperature-based discharge (optional)
  temperature_based_discharge_enabled: true
  temperature_forecast_sensor_entity_id: "sensor.temperatuur_1d"
  temperature_fallback_sensor_entity_id: "sensor.our_home_outdoor_temperature"
  temperature_default_discharge_count: 10

  # Opportunistic solar (optional)
  enable_opportunistic_solar: false
  solar_production_sensor_entity_id: "sensor.power_production_now"
  solar_energy_today_sensor_entity_id: "sensor.energy_production_today"
  solar_energy_next_hour_sensor_entity_id: "sensor.energy_next_hour"
  solar_energy_tomorrow_sensor_entity_id: "sensor.energy_production_tomorrow"
  sun_entity_id: "sun.sun"
  simulation_mode: false

# Schema defines the data types for validation
schema:
  price_sensor_entity_id: str
  average_power_sensor_entity_id: str
  battery_power_sensor_entity_id: str
  battery_grid_power_sensor_entity_id: str
  battery_soc_sensor_entity_id: str
  battery_api_status_sensor_entity_id: str
  max_inverter_power_w: int(1000,12000)
  default_charge_power_w: int(500,12000)
  default_discharge_power_w: int(0,12000)
  min_discharge_power_w: int(0,4000)
  min_scaled_power_w: int(1000,8000)
  conservative_soc_threshold_percent: float(0,100)
  minimum_discharge_soc_percent: float(0,100)
  topx_charge_count: int(1,48)
  topx_discharge_count: int(1,48)
  adaptive_monitor_interval_minutes: int(1,15)
  adaptive_power_grace_period_seconds: int(10,300)
  schedule_regeneration_cooldown_seconds: int(10,600)
  status_refresh_minutes: int(5,60)
  daily_reload_time: str
  hourly_regeneration: bool
  adaptive_disable_threshold_w: int(0,5000)
  adaptive_power_increment_w: int(50,1000)
  temperature_based_discharge_enabled: bool
  temperature_forecast_sensor_entity_id: str?
  temperature_fallback_sensor_entity_id: str?
  temperature_default_discharge_count: int(4,20)
  enable_opportunistic_solar: bool
  solar_production_sensor_entity_id: str?
  solar_energy_today_sensor_entity_id: str?
  solar_energy_next_hour_sensor_entity_id: str?
  solar_energy_tomorrow_sensor_entity_id: str?
  sun_entity_id: str?
  simulation_mode: bool
