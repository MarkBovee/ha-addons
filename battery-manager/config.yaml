name: Battery Manager
description: Optimize battery charging and discharging using dynamic prices, solar, grid, and EV status
version: "0.8.52"
slug: battery_manager
init: false
homeassistant_api: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

options:
  enabled: true
  dry_run: false
  entities:
    price_curve_entity: "sensor.energy_prices_electricity_import_price"
    export_price_curve_entity: "sensor.energy_prices_electricity_export_price"
    remaining_solar_energy_entity: "sensor.energy_production_today_remaining"
    soc_entity: "sensor.battery_api_battery_soc"
    grid_power_entity: "sensor.average_power_usage"
    solar_power_entity: "sensor.battery_api_pv_power"
    house_load_entity: "sensor.battery_api_load_power"
    battery_power_entity: "sensor.battery_api_battery_power"
    battery_mode_entity: "select.battery_api_battery_mode"
    temperature_entity: "sensor.temperatuur_1d"

  timing:
    update_interval: 3600
    monitor_interval: 60
    adaptive_power_grace_seconds: 60
    schedule_regen_cooldown_seconds: 60
    max_soc_sensor_age_seconds: 900
    max_ev_sensor_age_seconds: 180

  power:
    charging_power_limit: 1000
    max_charge_power: 8000
    max_discharge_power: 8000
    min_discharge_power: 0
    min_scaled_power: 4000

  passive_solar:
    enabled: true
    entry_threshold: 1000
    exit_threshold: 200
    min_solar_entry_power: 200

  soc:
    min_soc: 5
    conservative_soc: 40
    target_eod_soc: 20
    max_soc: 99
    battery_capacity_kwh: 25
    sell_buffer_enabled: true
    sell_buffer_min_soc: 20
    sell_buffer_rounding_step_pct: 10
    sell_buffer_activation_hours_before_sell: 3

  adaptive:
    enabled: true

  solar_aware_charging:
    enabled: true
    forecast_safety_factor: 0.8
    min_charge_power: 500

  heuristics:
    adaptive_price_threshold: 0.25
    top_x_charge_hours: 3
    top_x_discharge_hours: 2
    min_profit_threshold: 0.1
    overnight_wait_threshold: 0.02
    sell_wait_for_better_morning_enabled: true
    sell_wait_horizon_hours: 20
    sell_wait_min_gain_threshold: 0.02
    sell_wait_morning_start_hour: 0
    sell_wait_morning_end_hour: 10

  temperature_based_discharge:
    enabled: true
    thresholds:
      - temp_max: 0
        discharge_hours: 1
      - temp_max: 8
        discharge_hours: 1.5
      - temp_max: 12
        discharge_hours: 2
      - temp_max: 16
        discharge_hours: 2.5
      - temp_max: 999
        discharge_hours: 3

  ev_charger:
    enabled: true
    charging_threshold: 500
    entity_id: "sensor.charge_amps_monitor_charger_current_power"

  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""

schema:
  enabled: bool?
  dry_run: bool?
  entities:
    price_curve_entity: str
    export_price_curve_entity: str
    remaining_solar_energy_entity: str?
    soc_entity: str
    grid_power_entity: str
    solar_power_entity: str
    house_load_entity: str
    battery_power_entity: str?
    battery_mode_entity: str?
    temperature_entity: str

  timing:
    update_interval: int(300,7200)
    monitor_interval: int(10,300)
    adaptive_power_grace_seconds: int(0,600)
    schedule_regen_cooldown_seconds: int(0,600)
    max_soc_sensor_age_seconds: int(0,86400)?
    max_ev_sensor_age_seconds: int(0,86400)?

  power:
    charging_power_limit: int(0,10000)
    max_charge_power: int(1000,10000)
    max_discharge_power: int(1000,10000)
    min_discharge_power: int(0,10000)
    min_scaled_power: int(0,10000)

  passive_solar:
    enabled: bool?
    entry_threshold: int(0,10000)
    exit_threshold: int(0,10000)
    min_solar_entry_power: int(0,10000)

  soc:
    min_soc: int(0,100)
    conservative_soc: int(0,100)
    target_eod_soc: int(0,100)
    max_soc: int(0,100)
    battery_capacity_kwh: int(1,200)
    sell_buffer_enabled: bool?
    sell_buffer_min_soc: int(0,100)
    sell_buffer_rounding_step_pct: int(0,50)
    sell_buffer_activation_hours_before_sell: float(0,24)?

  adaptive:
    enabled: bool?

  solar_aware_charging:
    enabled: bool?
    forecast_safety_factor: float(0,1)?
    min_charge_power: int(0,10000)?

  heuristics:
    adaptive_price_threshold: float(0,5)?
    top_x_charge_hours: int(0,24)
    top_x_discharge_hours: int(0,24)
    min_profit_threshold: float(0,2)
    overnight_wait_threshold: float(0,1)
    sell_wait_for_better_morning_enabled: bool?
    sell_wait_horizon_hours: float(0,24)?
    sell_wait_min_gain_threshold: float(0,1)?
    sell_wait_morning_start_hour: int(0,23)?
    sell_wait_morning_end_hour: int(0,23)?

  temperature_based_discharge:
    enabled: bool?
    thresholds:
      - temp_max: int
        discharge_hours: float(0,6)

  ev_charger:
    enabled: bool?
    charging_threshold: int(100,5000)
    entity_id: str

  mqtt_host: str?
  mqtt_port: int?
  mqtt_user: str?
  mqtt_password: password?
